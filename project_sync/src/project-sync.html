<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Sync — Metadata</title>
  <script>
    const isWebKit = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;
    function send(message) {
      if (isWebKit) window.webkit.messageHandlers.live.postMessage(message);
      else if (isWebView2) window.chrome.webview.postMessage(message);
    }
    function closeDialog() {
      send({ method: "close_and_send", params: [JSON.stringify({ closed: true })] });
    }

    // Toggle a single composite node.
    function attachToggles() {
      document.querySelectorAll("li.node").forEach((li) => {
        const ul = li.querySelector(":scope > ul.children");
        if (!ul) return;
        const tog = li.querySelector(":scope > .row > .toggle");
        const open = () => {
          ul.classList.toggle("collapsed");
          if (tog) tog.textContent = ul.classList.contains("collapsed") ? "▸" : "▾";
        };
        if (tog) tog.addEventListener("click", (e) => { e.stopPropagation(); open(); });
        const row = li.querySelector(":scope > .row");
        if (row) row.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          open();
        });
      });
    }

    function setAllCollapsed(collapsed) {
      document.querySelectorAll("ul.children").forEach((ul) => {
        const isRoot = ul.parentElement && ul.parentElement.id === "tree";
        if (isRoot) return;
        ul.classList.toggle("collapsed", collapsed);
        const li = ul.parentElement;
        if (li) {
          const tog = li.querySelector(":scope > .row > .toggle");
          if (tog) tog.textContent = collapsed ? "▸" : "▾";
        }
      });
    }

    function copyTreeText() {
      const root = document.getElementById("tree");
      // Build an indented text representation from the visible tree.
      const lines = [];
      function walk(li, depth) {
        const k = li.querySelector(":scope > .row > .k")?.textContent || "";
        const sep = li.querySelector(":scope > .row > .sep")?.textContent || "";
        const v = li.querySelector(":scope > .row > .v")?.textContent || "";
        lines.push("  ".repeat(depth) + (k ? k + sep + " " : "") + v);
        const ul = li.querySelector(":scope > ul.children");
        if (!ul) return;
        ul.querySelectorAll(":scope > li.node").forEach((child) => walk(child, depth + 1));
      }
      root.querySelectorAll(":scope > ul.children > li.node").forEach((li) => walk(li, 0));
      const text = lines.join("\n");
      navigator.clipboard.writeText(text).then(() => flash("Copied tree to clipboard"));
    }

    function flash(msg) {
      const el = document.getElementById("flash");
      el.textContent = msg;
      el.classList.add("visible");
      clearTimeout(flash._t);
      flash._t = setTimeout(() => el.classList.remove("visible"), 1600);
    }

    function applyFilter() {
      const q = document.getElementById("filter").value.trim().toLowerCase();
      const root = document.getElementById("tree");
      const allLis = root.querySelectorAll("li.node");
      if (!q) {
        allLis.forEach((li) => { li.classList.remove("hidden", "match"); });
        return;
      }
      const matched = new Set();
      allLis.forEach((li) => {
        const k = (li.querySelector(":scope > .row > .k")?.textContent || "").toLowerCase();
        const v = (li.querySelector(":scope > .row > .v")?.textContent || "").toLowerCase();
        if (k.includes(q) || v.includes(q)) {
          matched.add(li);
          li.classList.add("match");
        } else {
          li.classList.remove("match");
        }
      });
      const reveal = new Set(matched);
      matched.forEach((li) => {
        let p = li.parentElement;
        while (p && p.id !== "tree") {
          if (p.tagName === "LI") reveal.add(p);
          if (p.tagName === "UL") p.classList.remove("collapsed");
          p = p.parentElement;
        }
      });
      allLis.forEach((li) => {
        li.classList.toggle("hidden", !reveal.has(li));
      });
      document.querySelectorAll("ul.children").forEach((ul) => {
        const li = ul.parentElement;
        if (li && li.tagName === "LI") {
          const tog = li.querySelector(":scope > .row > .toggle");
          if (tog && tog.textContent !== " ") {
            tog.textContent = ul.classList.contains("collapsed") ? "▸" : "▾";
          }
        }
      });
    }

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((b) => {
        b.classList.toggle("active", b.dataset.tab === name);
      });
      document.querySelectorAll(".panel").forEach((p) => {
        p.classList.toggle("hidden", p.dataset.panel !== name);
      });
      document.querySelectorAll(".tab-controls").forEach((c) => {
        c.classList.toggle("hidden", c.dataset.for !== name);
      });
      // The Fit math needs the scroll container to actually have a size, which
      // it doesn't while the panel is hidden — re-fit when we switch in.
      if (name === "arrangement" && !arr.userZoomed) requestAnimationFrame(arr.fit);
    }

    // ---------- arrangement zoom + responsive fit ----------
    const arr = {
      wrap: null,
      scroll: null,
      totalBeats: 0,
      pxPerBeat: 6,
      userZoomed: false,
      labelColumnPx: 140,
      minPxPerBeat: 0.25,
      maxPxPerBeat: 80,
      init() {
        this.wrap = document.querySelector(".arr-wrap");
        this.scroll = document.getElementById("arrScroll");
        if (!this.wrap || !this.scroll) return;
        this.totalBeats = Number(this.wrap.dataset.totalBeats) || 16;
        const inb = document.getElementById("arrZoomIn");
        const out = document.getElementById("arrZoomOut");
        const fit = document.getElementById("arrZoomFit");
        if (inb) inb.onclick = () => this.zoom(1.5);
        if (out) out.onclick = () => this.zoom(1 / 1.5);
        if (fit) fit.onclick = () => { this.userZoomed = false; this.fit(); };
        // Auto-refit on dialog resize until the user zooms manually.
        const ro = new ResizeObserver(() => {
          if (!this.userZoomed) this.fit();
        });
        ro.observe(this.scroll);
        this.fit();
      },
      apply() {
        if (!this.wrap) return;
        this.wrap.style.setProperty("--px-per-beat", this.pxPerBeat + "px");
        // Density classes: dim down the bar-label cadence as we zoom out so
        // numbers don't pile on top of each other. (Bars are 4 beats apart.)
        const pxPerBar = this.pxPerBeat * 4;
        this.wrap.classList.toggle("dense-1", pxPerBar < 60 && pxPerBar >= 30);
        this.wrap.classList.toggle("dense-2", pxPerBar < 30 && pxPerBar >= 12);
        this.wrap.classList.toggle("dense-3", pxPerBar < 12);
        this.wrap.classList.toggle("tight", this.pxPerBeat < 10);
        const disp = document.getElementById("arrZoomDisplay");
        if (disp) disp.textContent = `${this.pxPerBeat.toFixed(2)} px/beat`;
      },
      fit() {
        if (!this.scroll) return;
        const w = this.scroll.clientWidth - this.labelColumnPx - 4;
        if (w <= 0 || this.totalBeats <= 0) return;
        const target = w / this.totalBeats;
        this.pxPerBeat = clamp(target, this.minPxPerBeat, this.maxPxPerBeat);
        this.apply();
      },
      zoom(factor) {
        this.userZoomed = true;
        this.pxPerBeat = clamp(this.pxPerBeat * factor, this.minPxPerBeat, this.maxPxPerBeat);
        this.apply();
      },
    };
    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

    document.addEventListener("DOMContentLoaded", () => {
      attachToggles();
      arr.init();
      document.querySelectorAll(".tab").forEach((b) => {
        b.onclick = () => switchTab(b.dataset.tab);
      });
      switchTab("arrangement");
      document.getElementById("expandAll").onclick = () => setAllCollapsed(false);
      document.getElementById("collapseAll").onclick = () => setAllCollapsed(true);
      document.getElementById("copy").onclick = copyTreeText;
      document.getElementById("close").onclick = closeDialog;
      document.getElementById("copyPath").onclick = () => {
        const path = document.getElementById("savedPath").textContent || "";
        navigator.clipboard.writeText(path).then(() => flash("Copied path"));
      };
      document.getElementById("filter").addEventListener("input", applyFilter);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDialog();
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "f") {
          e.preventDefault();
          document.getElementById("filter").focus();
        }
      });
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    *:not(dialog) { margin: 0; }
    input, button { font: inherit; }

    :root {
      --p-live-ui-bg: hsl(0, 0%, 21%);
      --p-live-control-bg: hsl(0, 0%, 16%);
      --p-live-input-bg: hsl(0, 0%, 12%);
      --p-live-text-primary: hsl(0, 0%, 71%);
      --p-live-control-border: hsl(0, 0%, 7%);
      --p-live-text-secondary: hsl(0, 0%, 41%);
      --p-live-accent-primary: hsl(31, 100%, 67%);
      --p-live-control-text--enabled: hsl(0, 0%, 7%);

      --c-bg: oklch(from var(--p-live-ui-bg) l c h);
      --c-text-primary: oklch(from var(--p-live-text-primary) l c h);
      --c-text-secondary: oklch(from var(--p-live-text-secondary) l c h);
      --c-control-bg-400: oklch(from var(--p-live-control-bg) calc(l * 0.9) c h);
      --c-control-bg-500: oklch(from var(--p-live-control-bg) l c h);
      --c-control-border: oklch(from var(--p-live-control-border) l c h);
      --c-control-outline: var(--c-text-secondary);
      --c-on-foreground: oklch(from var(--p-live-control-text--enabled) l c h);
      --c-input-bg: oklch(from var(--p-live-input-bg) l c h);
      --c-accent: oklch(from var(--p-live-accent-primary) l c h);

      --c-string: hsl(140, 35%, 70%);
      --c-number: hsl(200, 55%, 75%);
      --c-bool:   hsl(31, 100%, 75%);
      --c-null:   hsl(0, 0%, 50%);
    }

    html {
      background-color: var(--c-bg);
      color: var(--c-text-primary);
      font-family: "AbletonSansSmall", sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }
    body { height: 100%; display: flex; flex-direction: column; padding: 1em 1.25em 1.25em; gap: 0.6em; }

    header { display: flex; flex-direction: column; gap: 0.5em; }
    .title-row { display: flex; align-items: baseline; gap: 0.6em; }
    .title { font-size: 1.35rem; color: var(--c-text-primary); }
    .meta { color: var(--c-text-secondary); font-variant-numeric: tabular-nums; }

    .saved-row { display: flex; align-items: center; gap: 0.5em; }
    .saved-row .label { color: var(--c-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.85rem; }
    .saved-row .path {
      flex: 1;
      background: var(--c-input-bg);
      border: 1px solid var(--c-control-border);
      padding: 2px 8px;
      font-family: "AbletonSansMono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--c-string);
      font-size: 11px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      user-select: all;
    }
    .alx-button.small { font-size: 0.95rem; padding: 0 0.7em; height: 20px; }

    .counts { display: flex; flex-wrap: wrap; gap: 0.35em; }
    .chip {
      display: inline-flex; gap: 0.5em; align-items: center;
      background: var(--c-input-bg);
      border: 1px solid var(--c-control-border);
      padding: 2px 8px; border-radius: 1em;
    }
    .chip-k { color: var(--c-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.85rem; }
    .chip-v { color: var(--c-text-primary); font-variant-numeric: tabular-nums; }

    .controls { display: flex; gap: 0.4em; align-items: center; }
    .controls .spacer { flex: 1; }

    .alx-button {
      font-size: 1rem; line-height: 1;
      background-color: var(--c-control-bg-500);
      color: var(--c-text-primary);
      border: 1px solid var(--c-control-border);
      height: 22px; padding: 0 0.9em; border-radius: 1em;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    .alx-button:hover { background-color: var(--c-control-bg-400); }
    .alx-button.primary { color: var(--c-on-foreground); background-color: var(--c-accent); }
    .alx-button:focus { outline: 2px solid var(--c-control-outline); }

    .alx-input {
      font-size: 1rem; line-height: 1.5;
      background-color: var(--c-input-bg);
      color: var(--c-text-primary);
      border: 1px solid var(--c-control-border);
      height: 22px; padding: 0 0.5em; min-width: 180px;
    }
    .alx-input:focus { outline: 2px solid var(--c-control-outline); }

    .tree-wrap {
      flex: 1; min-height: 0;
      background: var(--c-input-bg);
      border: 1px solid var(--c-control-border);
      padding: 0.6em 0.5em;
      overflow: auto;
      font-family: "AbletonSansMono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11.5px;
    }

    ul.children {
      list-style: none;
      padding-left: 1.1em;
      margin: 0;
      border-left: 1px dotted hsl(0, 0%, 25%);
    }
    ul.children.collapsed { display: none; }
    #tree > ul.children { padding-left: 0; border-left: none; }

    li.node { line-height: 1.55; }
    li.node.hidden { display: none; }
    .row { cursor: default; user-select: text; padding: 1px 4px; border-radius: 3px; }
    .row:hover { background: hsl(0, 0%, 15%); }
    li.node.match > .row { background: hsl(31, 60%, 18%); }

    .toggle {
      display: inline-block; width: 1em; color: var(--c-text-secondary);
      cursor: pointer; user-select: none; text-align: center;
    }
    .k { color: var(--c-text-primary); }
    .sep { color: var(--c-text-secondary); margin-right: 0.4em; }
    .v { font-variant-numeric: tabular-nums; }
    .v-string { color: var(--c-string); }
    .v-number { color: var(--c-number); }
    .v-bool   { color: var(--c-bool); }
    .v-null   { color: var(--c-null); font-style: italic; }
    .v-object, .v-array { color: var(--c-text-secondary); }

    .swatch {
      display: inline-block; width: 0.8em; height: 0.8em;
      border: 1px solid var(--c-control-border); margin-left: 0.4em;
      vertical-align: middle; border-radius: 2px;
    }

    .tabs { display: flex; gap: 0.4em; align-items: center; }
    .tab { opacity: 0.7; }
    .tab.active { opacity: 1; color: var(--c-on-foreground); background-color: var(--c-accent); }
    .tab-controls { display: flex; gap: 0.4em; align-items: center; }
    .tab-controls.hidden { display: none; }

    .panel { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .panel.hidden { display: none; }

    /* ---------- arrangement view ---------- */
    /* All position math is `<beats> * var(--px-per-beat)` so the entire chart
       rescales by mutating a single CSS variable. */
    .arr-wrap {
      flex: 1; min-height: 0;
      background: var(--c-input-bg);
      border: 1px solid var(--c-control-border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .arr-toolbar {
      display: flex; align-items: center; gap: 0.35em;
      padding: 4px 8px;
      background: hsl(0, 0%, 17%);
      border-bottom: 1px solid var(--c-control-border);
    }
    .arr-toolbar .spacer { flex: 1; }
    .arr-toolbar .arr-zoom-display {
      color: var(--c-text-secondary);
      font-variant-numeric: tabular-nums;
      font-size: 10.5px;
      min-width: 6em;
    }
    .arr-toolbar .arr-summary {
      color: var(--c-text-secondary);
      font-variant-numeric: tabular-nums;
      font-size: 10.5px;
    }

    .arr-scroll {
      flex: 1; min-height: 0;
      overflow: auto;
      position: relative;
      display: grid;
      grid-template-columns: 140px calc(var(--total-beats) * var(--px-per-beat));
      grid-template-rows: 22px 16px auto;
      grid-template-areas:
        ". ruler"
        ". cues"
        "labels tracks";
    }
    .arr-ruler {
      grid-area: ruler;
      position: sticky; top: 0;
      background: hsl(0, 0%, 14%);
      border-bottom: 1px solid var(--c-control-border);
      height: 22px;
      z-index: 3;
    }
    .arr-ruler .tick {
      position: absolute; top: 0; bottom: 0;
      width: 1px;
      background: hsl(0, 0%, 22%);
      left: calc(var(--at) * var(--px-per-beat));
    }
    .arr-ruler .tick.bar { background: hsl(0, 0%, 35%); }
    .arr-ruler .bar-num {
      position: absolute; top: 4px;
      left: calc(var(--at) * var(--px-per-beat) + 2px);
      color: var(--c-text-secondary);
      font-size: 9.5px;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }
    /* When zoomed out, ruler labels would overlap — show only every Nth bar. */
    .arr-wrap.dense-1 .bar-num:nth-child(odd) { display: none; }
    .arr-wrap.dense-2 .bar-num:not(:nth-child(8n+1)) { display: none; }
    .arr-wrap.dense-3 .bar-num:not(:nth-child(16n+1)) { display: none; }

    .arr-cues {
      grid-area: cues;
      position: sticky; top: 22px;
      height: 16px;
      background: hsl(0, 0%, 14%);
      border-bottom: 1px dotted hsl(0, 0%, 22%);
      z-index: 2;
    }
    .arr-cues .cue-line {
      position: absolute; top: 0; bottom: -10000px;
      width: 1px;
      left: calc(var(--at) * var(--px-per-beat));
      background: hsl(31, 100%, 67%);
      opacity: 0.55;
      z-index: 1;
    }
    .arr-cues .cue-label {
      position: absolute;
      left: calc(var(--at) * var(--px-per-beat) + 2px);
      color: hsl(31, 100%, 75%);
      font-size: 9.5px;
      padding: 0 3px;
      background: hsl(0, 0%, 14%);
      white-space: nowrap;
      pointer-events: none;
    }
    .arr-tracks { grid-area: tracks; position: relative; min-width: 0; }

    .lane { display: contents; }
    .lane .lane-label {
      grid-column: 1;
      position: sticky; left: 0;
      background: hsl(0, 0%, 17%);
      border-right: 1px solid var(--c-control-border);
      border-bottom: 1px solid hsl(0, 0%, 14%);
      padding: 4px 8px;
      display: flex; align-items: center; gap: 0.4em;
      height: 28px;
      z-index: 2;
    }
    .lane .lane-label.sub {
      background: hsl(0, 0%, 15%);
      color: var(--c-text-secondary);
      font-size: 10.5px;
      padding-left: 18px;
      height: 18px;
    }
    .lane .track-name { color: var(--c-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lane .flags { display: flex; gap: 0.2em; margin-left: auto; }
    .lane .flag {
      display: inline-block; width: 14px; height: 14px;
      line-height: 14px; text-align: center; border-radius: 2px;
      font-size: 9.5px; font-weight: 700;
      background: hsl(0, 0%, 14%);
      color: var(--c-text-secondary);
    }
    .lane .flag.mute { color: hsl(0, 70%, 75%); }
    .lane .flag.solo { color: hsl(50, 90%, 70%); }
    .lane .flag.arm { color: hsl(0, 80%, 65%); }

    .lane .lane-clips {
      grid-column: 2;
      position: relative;
      height: 28px;
      border-bottom: 1px solid hsl(0, 0%, 14%);
    }
    .take-lane .lane-clips { height: 18px; background: hsl(0, 0%, 12%); }

    .clip {
      position: absolute; top: 3px; bottom: 3px;
      left: calc(var(--start) * var(--px-per-beat));
      width: calc(var(--span) * var(--px-per-beat));
      min-width: 2px;
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      cursor: default;
    }
    .clip.take { top: 2px; bottom: 2px; }
    .clip.muted { opacity: 0.4; }
    .clip:hover { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55); z-index: 4; }
    .clip .clip-label {
      position: absolute; left: 3px; right: 3px; top: 50%; transform: translateY(-50%);
      color: rgba(0, 0, 0, 0.78);
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      pointer-events: none;
    }
    /* Hide the clip name on bars that are too narrow to fit any text. */
    .arr-wrap.tight .clip-label { display: none; }
    .clip .loop {
      position: absolute; top: 0; bottom: 0;
      left: calc(var(--lx) * var(--px-per-beat));
      width: calc(var(--lw) * var(--px-per-beat));
      border-left: 1px dashed rgba(0, 0, 0, 0.55);
      border-right: 1px dashed rgba(0, 0, 0, 0.55);
      background: rgba(255, 255, 255, 0.12);
    }

    .footer { display: flex; align-items: center; gap: 0.6em; }
    .footer .flash {
      color: var(--c-accent); opacity: 0; transition: opacity 200ms ease;
    }
    .footer .flash.visible { opacity: 1; }
    .footer .spacer { flex: 1; }
  </style>
</head>

<body>
  <header>
    <div class="title-row">
      <div class="title">Project Sync — SDK Metadata</div>
      <div class="meta">API __API__ · __TS__</div>
    </div>
    <div class="saved-row">
      <span class="label">Saved JSON</span>
      <code class="path" id="savedPath">__SAVED_PATH__</code>
      <button class="alx-button small" id="copyPath" title="Copy path">Copy path</button>
    </div>
    <div class="counts" id="counts">__COUNTS__</div>
    <div class="tabs">
      <button class="alx-button tab active" data-tab="arrangement">Arrangement</button>
      <button class="alx-button tab" data-tab="tree">Tree</button>
      <div class="spacer"></div>
      <div class="controls tab-controls" data-for="tree">
        <input class="alx-input" id="filter" type="search" placeholder="Filter (cmd-F) — name, key, value…" />
        <button class="alx-button" id="expandAll">Expand all</button>
        <button class="alx-button" id="collapseAll">Collapse all</button>
        <button class="alx-button" id="copy">Copy tree</button>
      </div>
    </div>
  </header>

  <div class="panel" data-panel="arrangement">__ARRANGEMENT__</div>
  <div class="panel hidden" data-panel="tree">
    <div class="tree-wrap" id="tree">__TREE__</div>
  </div>

  <div class="footer">
    <span class="flash" id="flash"></span>
    <div class="spacer"></div>
    <button class="alx-button primary" id="close">Close</button>
  </div>
</body>

</html>
