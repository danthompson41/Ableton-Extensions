<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLR — Slice across grid</title>
  <script>
    // Injected by the extension before the page is loaded (URI-encoded JSON).
    const INFO = (() => {
      try { return JSON.parse(decodeURIComponent("__MLR_INFO__")); }
      catch { return { name: "loop", regionBeats: 0, maxSlices: 16 }; }
    })();

    const state = { slices: Math.min(16, INFO.maxSlices), mode: "loop" };

    const isWebKit = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;
    function send(message) {
      if (isWebKit) window.webkit.messageHandlers.live.postMessage(message);
      else if (isWebView2) window.chrome.webview.postMessage(message);
    }
    function closeWith(result) {
      send({ method: "close_and_send", params: [JSON.stringify(result)] });
    }
    function confirm() { closeWith({ slices: state.slices, mode: state.mode }); }
    function cancel() { closeWith({ cancelled: true, slices: 0, mode: "loop" }); }

    function setSlices(n) {
      state.slices = Math.max(1, Math.min(INFO.maxSlices, Math.floor(n)));
      render();
    }
    function setMode(m) { state.mode = m; render(); }

    function render() {
      // Highlight the active preset.
      document.querySelectorAll('[data-slices]').forEach((el) => {
        el.classList.toggle('active', Number(el.dataset.slices) === state.slices);
      });
      document.querySelectorAll('[data-mode]').forEach((el) => {
        el.classList.toggle('active', el.dataset.mode === state.mode);
      });
      const custom = document.getElementById('custom');
      if (document.activeElement !== custom) custom.value = state.slices;

      // Grid preview: one lit pad per slice, rainbow across the row.
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const cols = Math.min(16, state.slices);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      for (let i = 0; i < state.slices; i++) {
        const pad = document.createElement('div');
        pad.className = 'pad';
        pad.style.background = `hsl(${Math.round((i / state.slices) * 360)}, 65%, 55%)`;
        grid.appendChild(pad);
      }

      const beats = INFO.regionBeats / state.slices;
      document.getElementById('detail').textContent =
        `${state.slices} slices · ${beats.toFixed(3)} beats each · region ${INFO.regionBeats.toFixed(2)} beats`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('title').textContent = `Slice “${INFO.name}”`;
      const presets = document.getElementById('presets');
      [4, 8, 16, 32, 64].forEach((n) => {
        if (n > INFO.maxSlices) return;
        const b = document.createElement('button');
        b.className = 'alx-button preset';
        b.dataset.slices = String(n);
        b.textContent = String(n);
        b.onclick = () => setSlices(n);
        presets.appendChild(b);
      });
      document.getElementById('custom').max = String(INFO.maxSlices);
      document.getElementById('custom').addEventListener('input', (e) => setSlices(e.target.value));
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') confirm();
        if (e.key === 'Escape') cancel();
      });
      render();
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    *:not(dialog) { margin: 0; }
    input, button { font: inherit; }

    :root {
      --p-live-ui-bg: hsl(0, 0%, 21%);
      --p-live-control-bg: hsl(0, 0%, 16%);
      --p-live-input-bg: hsl(0, 0%, 12%);
      --p-live-text-primary: hsl(0, 0%, 71%);
      --p-live-control-border: hsl(0, 0%, 7%);
      --p-live-text-secondary: hsl(0, 0%, 41%);
      --p-live-accent-primary: hsl(31, 100%, 67%);
      --p-live-control-text--enabled: hsl(0, 0%, 7%);

      --c-bg: oklch(from var(--p-live-ui-bg) l c h);
      --c-text-primary: oklch(from var(--p-live-text-primary) l c h);
      --c-text-secondary: oklch(from var(--p-live-text-secondary) l c h);
      --c-control-bg-400: oklch(from var(--p-live-control-bg) calc(l * 0.9) c h);
      --c-control-bg-500: oklch(from var(--p-live-control-bg) l c h);
      --c-control-border: oklch(from var(--p-live-control-border) l c h);
      --c-control-outline: var(--c-text-secondary);
      --c-on-foreground: oklch(from var(--p-live-control-text--enabled) l c h);
      --c-input-bg: oklch(from var(--p-live-input-bg) l c h);
      --c-accent: oklch(from var(--p-live-accent-primary) l c h);
    }

    html {
      background-color: var(--c-bg);
      color: var(--c-text-primary);
      font-family: "AbletonSansSmall", sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }
    body { height: 100%; display: flex; padding: 1.25em; }

    .form { display: flex; flex-direction: column; gap: 0.85em; width: 100%; }
    .title { font-size: 1.35rem; color: var(--c-text-primary); }
    .label { color: var(--c-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
    .detail { color: var(--c-text-secondary); font-variant-numeric: tabular-nums; }

    .row { display: flex; gap: 0.4em; align-items: center; flex-wrap: wrap; }

    .grid {
      display: grid;
      gap: 3px;
      width: 100%;
      padding: 6px;
      background: var(--c-input-bg);
      border: 1px solid var(--c-control-border);
    }
    .pad { aspect-ratio: 1; border-radius: 2px; opacity: 0.92; }

    .alx-button {
      font-size: 1rem; line-height: 1;
      background-color: var(--c-control-bg-500);
      color: var(--c-text-primary);
      border: 1px solid var(--c-control-border);
      height: 22px; padding: 0 0.9em; border-radius: 1em;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    .alx-button:hover { background-color: var(--c-control-bg-400); }
    .alx-button.active { color: var(--c-on-foreground); background-color: var(--c-accent); }
    .alx-button:focus { outline: 2px solid var(--c-control-outline); }
    .preset { min-width: 2.6em; text-align: center; padding: 0 0.6em; }

    .alx-input {
      font-size: 1rem; line-height: 1.5;
      background-color: var(--c-input-bg);
      color: var(--c-text-primary);
      border: 1px solid var(--c-control-border);
      height: 22px; padding: 0 0.33em; width: 4.5em;
    }
    .alx-input:focus { outline: 2px solid var(--c-control-outline); }

    .spacer { flex: 1; }
    .buttons { display: flex; gap: 0.5em; justify-content: flex-end; margin-top: 0.25em; }
  </style>
</head>

<body>
  <div class="form">
    <div class="title" id="title">Slice</div>

    <div class="label">Slices</div>
    <div class="row" id="presets"></div>
    <div class="row">
      <span class="label">Custom</span>
      <input class="alx-input" type="number" id="custom" min="1" step="1" />
    </div>

    <div class="label">On press</div>
    <div class="row">
      <button class="alx-button" data-mode="loop" onclick="setMode('loop')">Loop slice</button>
      <button class="alx-button" data-mode="loopToEnd" onclick="setMode('loopToEnd')">Loop to end</button>
    </div>

    <div class="grid" id="grid"></div>
    <div class="detail" id="detail"></div>

    <div class="buttons">
      <button class="alx-button" onclick="cancel()">Cancel</button>
      <button class="alx-button" onclick="confirm()">Slice</button>
    </div>
  </div>
</body>

</html>
